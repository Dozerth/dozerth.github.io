<!DOCTYPE html>
<html lang="es" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Sitio no disponible</title>

    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        night: '#020617',
                        tealish: '#22d3ee',
                        crimson: '#e11d48',
                        gold: '#fbbf24',
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                }
            }
        }
    </script>

    <style>
        .glass {
            background: rgba(2, 6, 23, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .hero-gradient {
            background: radial-gradient(circle at 50% 50%, rgba(34, 211, 238, 0.08) 0%, rgba(2, 6, 23, 1) 100%);
        }
    </style>
</head>
<body class="bg-night text-slate-200 font-sans antialiased selection:bg-tealish/30 selection:text-tealish">

    <main class="min-h-screen hero-gradient flex items-center justify-center px-6 relative overflow-hidden">

        <div class="glass max-w-lg w-full text-center px-8 py-14 rounded-2xl relative z-10">
            <div class="w-16 h-16 mx-auto mb-8 bg-tealish/10 rounded-full flex items-center justify-center border border-tealish/20 text-tealish">
                <i data-lucide="power-off" class="w-7 h-7"></i>
            </div>

            <h1 class="text-2xl md:text-3xl font-bold text-white mb-4 tracking-tight">
                Sitio no disponible
            </h1>

            <p class="text-slate-400 text-sm md:text-base leading-relaxed">
                No hay contenido disponible en este momento.
            </p>

            <div class="w-16 h-px bg-white/10 mx-auto my-8"></div>

            <p class="text-slate-500 text-[11px] font-mono uppercase tracking-widest">
                &copy; <span id="year"></span>
            </p>
        </div>

        <div class="absolute top-1/2 left-1/4 w-64 h-64 bg-tealish/5 blur-[120px] rounded-full"></div>
        <div class="absolute bottom-0 right-1/4 w-96 h-96 bg-crimson/5 blur-[120px] rounded-full"></div>
    </main>

    <script>
        lucide.createIcons();
        document.getElementById("year").textContent = new Date().getFullYear();
    </script>
</body>
</html>
